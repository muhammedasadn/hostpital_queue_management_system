services:
  # Backend Service
  - type: web
    name: hospital-queue-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        # Set to your frontend URL after deployment
        # Example: https://hospital-queue-client.onrender.com
        value: https://hospital-queue-client.onrender.com

  # Frontend Service
  - type: web
    name: hospital-queue-client
    runtime: node
    rootDir: client
    buildCommand: npm run build
    startCommand: npx serve -s build -l 3000
    envVars:
      - key: REACT_APP_API_URL
        # Backend API URL - update after backend deploys
        # Example: https://hospital-queue-server.onrender.com/api
        value: https://hospital-queue-server.onrender.com/api
      - key: REACT_APP_SOCKET_URL
        # Backend WebSocket URL - update after backend deploys
        # Example: https://hospital-queue-server.onrender.com
        value: https://hospital-queue-server.onrender.com
