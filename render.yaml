services:
  # Backend Service
  - type: web
    name: hospital-queue-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        # Will be automatically set by Render
        fromService:
          type: web
          name: hospital-queue-client
          property: url

  # Frontend Service
  - type: web
    name: hospital-queue-client
    runtime: node
    rootDir: client
    buildCommand: npm run build
    startCommand: npx serve -s build -l 3000
    envVars:
      - key: REACT_APP_API_URL
        # Will be automatically set to backend URL
        fromService:
          type: web
          name: hospital-queue-server
          property: url
          path: /api
      - key: REACT_APP_SOCKET_URL
        # Will be automatically set to backend URL
        fromService:
          type: web
          name: hospital-queue-server
          property: url
